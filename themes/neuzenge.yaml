Neuzenge:
  font-family: Inter Variable, Inter, Roboto, sans-serif
  ha-card-background: rgba(from var(--tile-color) r g b / 0.5)
  ha-card-border-color: transparent
  ha-card-border-radius: 2em
  ha-card-border-size: 0;

  modes:
    dark:
      ha-card-box-shadow: inset 0.5px 0.5px 0.5px 0 rgba(255, 255, 255, 0.05), inset -0.5px -0.5px 0.5px 0.5px rgba(255, 255, 255, 0.05), 0 4px 8px 0 rgba(0, 0, 0, 0.05), 0 6px 20px 0 rgba(0, 0, 0, 0.05)
    light:
      ha-card-box-shadow: inset 2px 2px 1px 0 rgba(255, 255, 255, 0.3), inset -2px -2px 2px 1px rgba(255, 255, 255, 0.3), 0 4px 8px 0 rgba(0, 0, 0, 0.05), 0 6px 20px 0 rgba(0, 0, 0, 0.05)
